            cursor: none; 
            
            /* BORRAMOS TODO LO DEMÁS. El tamaño lo decidirá JavaScript */
        }
        
        #console { 
			display: none;

	<script>
	function _applyPixelPerfectScale() {
		// Detectamos la escala real del monitor (ej: 1.25 para Windows al 125%, 2 para Retina Mac)
		let dpr = window.devicePixelRatio || 1;
		
		// Forzamos un multiplicador ENTERO (2x = 1 píxel del Amiga serán exactamente 4 píxeles físicos cuadrados)
		let perfectScale = 2; 
		
		// La resolucion LOGICA es 640x512 (independiente del framebuffer fisico). En HIRES el
		// framebuffer es 640x256 y al darle altura logica 512 se estira x2 -> pixel 1x2.
		const LW = 640, LH = 512;
		
		// Si la pantalla del usuario es muy pequeña para el escalado x2, bajamos a x1
		if (window.innerWidth < (LW * perfectScale / dpr)) {
			perfectScale = 1;
		}
		
		// Contrarrestamos la escala del SO dividiendo el tamaño final por el dpr
		canvas.style.width = ((LW * perfectScale) / dpr) + 'px';
		canvas.style.height = ((LH * perfectScale) / dpr) + 'px';
	}

	// Lo aplicamos al iniciar y cada vez que el usuario redimensione el navegador
	_applyPixelPerfectScale();
	window.addEventListener('resize', _applyPixelPerfectScale);
	</script>
</body>
